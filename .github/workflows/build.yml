name: 🔨 Build ModernKeyboard APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 Setup ─────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle Bootstrap (gradlew missing from AI Studio ZIP) ─
      - name: Setup Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.13 --distribution-type all

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 4. Android SDK ───────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      # ── 5. Debug Keystore (gitignored, create fresh in CI) ───────
      - name: Create debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 10000 \
            -keyalg RSA \
            -keysize 2048

      # ── 6. Build APK ─────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7. Upload APK as Artifact ────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ModernKeyboard-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 8. Show APK info ─────────────────────────────────────────
      - name: Show APK size
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "✅ APK built: $APK"
          ls -lh "$APK"
